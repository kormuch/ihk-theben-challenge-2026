services:
  product-layer:
    build:
      context: .
    image: thebenpaul/product-layer:local
    container_name: thebenpaul-product-layer
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      THEBEN_DEFAULT_ROLE: viewer
      THEBEN_DATA_DIR: /app/data
    ports:
      - "${PRODUCT_LAYER_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8080/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  test:
    profiles: ["test"]
    build:
      context: .
    image: thebenpaul/product-layer:local
    environment:
      TEST_BASE_URL: http://product-layer:8080
      TEST_HTTP_TIMEOUT: 10
    depends_on:
      product-layer:
        condition: service_healthy
    command: ["python", "-B", "-m", "unittest", "discover", "-s", "tests", "-v"]

  ollama:
    image: ollama/ollama:latest
    container_name: thebenpaul-ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_ORIGINS: "*"
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

volumes:
  ollama:
