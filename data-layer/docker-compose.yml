services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paul
      POSTGRES_PASSWORD: paul
      POSTGRES_DB: paul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paul"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Lakehouse infrastructure ---

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set paul http://minio:9000 admin password &&
      mc mb paul/lakehouse --ignore-existing &&
      mc mb paul/lakehouse-metadata --ignore-existing &&
      echo 'MinIO buckets ready'
      "

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    environment:
      CATALOG_WAREHOUSE: s3://lakehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
    ports:
      - "8181:8181"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  trino:
    image: trinodb/trino:462
    ports:
      - "8082:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
    depends_on:
      iceberg-rest:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/info || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  iceberg-init:
    image: trinodb/trino:462
    depends_on:
      trino:
        condition: service_healthy
    volumes:
      - ./init/iceberg-init.sql:/init.sql:ro
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for Trino to be fully ready...' &&
      sleep 5 &&
      trino --server http://trino:8080 --catalog iceberg --execute \"$(cat /init.sql)\" &&
      echo 'Iceberg tables created'
      "

  # --- Application ---

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://paul:paul@db:5432/paul
      STORAGE_PATH: /storage/originals
      PRODUCT_LAYER_DATA_DIR: /product-layer-data
      DATA_LAYER_LLM_CONFIG: ${DATA_LAYER_LLM_CONFIG:-/config/llm_agents.json}
      DATA_LAYER_LLM_CHAIN: ${DATA_LAYER_LLM_CHAIN:-local_ollama_lan}
      DATA_LAYER_OLLAMA_BASE_URL: ${DATA_LAYER_OLLAMA_BASE_URL:-http://192.168.178.60:11434}
      THEBEN_LEGACY_BASE_URL: ${THEBEN_LEGACY_BASE_URL:-http://192.168.8.200:8000}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,192.168.8.200,192.168.0.0/16,10.0.0.0/8}
      no_proxy: ${no_proxy:-localhost,127.0.0.1,host.docker.internal,192.168.8.200,192.168.0.0/16,10.0.0.0/8}
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      TRINO_CATALOG: iceberg
      TRINO_SCHEMA: products
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./config:/config:ro
      - ./storage:/storage
      - ../product-layer/data:/product-layer-data
    depends_on:
      db:
        condition: service_healthy
      iceberg-init:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # --- OpenMetadata (optional: docker compose --profile openmetadata up) ---

  openmetadata-mysql:
    image: mysql:8.0
    profiles: ["openmetadata"]
    environment:
      MYSQL_ROOT_PASSWORD: openmetadata
      MYSQL_DATABASE: openmetadata_db
      MYSQL_USER: openmetadata
      MYSQL_PASSWORD: openmetadata
    volumes:
      - om_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "openmetadata", "-popenmetadata"]
      interval: 10s
      timeout: 5s
      retries: 10

  openmetadata-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    profiles: ["openmetadata"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - om_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  openmetadata-migrate:
    image: docker.getcollate.io/openmetadata/server:1.5.11
    profiles: ["openmetadata"]
    command: ["/opt/openmetadata/bootstrap/openmetadata-ops.sh", "migrate"]
    environment: &om-env
      OPENMETADATA_CLUSTER_NAME: paul-lakehouse
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      DB_SCHEME: mysql
      DB_USE_SSL: "false"
      DB_HOST: openmetadata-mysql
      DB_PORT: "3306"
      DB_USER: openmetadata
      DB_USER_PASSWORD: openmetadata
      SEARCH_TYPE: elasticsearch
      ELASTICSEARCH_HOST: openmetadata-elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
      PIPELINE_SERVICE_CLIENT_ENABLED: "false"
      SERVER_HOST_API_URL: "http://openmetadata:8585/api"
      AUTHENTICATION_PROVIDER: basic
      AUTHORIZER_ADMIN_PRINCIPALS: "[admin]"
      AUTHORIZER_INGESTION_PRINCIPALS: "[ingestion-bot]"
      LOG_LEVEL: INFO
    depends_on:
      openmetadata-mysql:
        condition: service_healthy
      openmetadata-elasticsearch:
        condition: service_healthy

  openmetadata:
    image: docker.getcollate.io/openmetadata/server:1.5.11
    profiles: ["openmetadata"]
    environment: *om-env
    ports:
      - "8585:8585"
    depends_on:
      openmetadata-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8585/api/v1/system/version || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

volumes:
  postgres_data:
  minio_data:
  om_mysql_data:
  om_es_data:
