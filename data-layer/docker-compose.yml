services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paul
      POSTGRES_PASSWORD: paul
      POSTGRES_DB: paul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paul"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://paul:paul@db:5432/paul
      STORAGE_PATH: /storage/originals
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
