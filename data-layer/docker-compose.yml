services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paul
      POSTGRES_PASSWORD: paul
      POSTGRES_DB: paul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paul"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://paul:paul@db:5432/paul
      STORAGE_PATH: /storage/originals
      PRODUCT_LAYER_DATA_DIR: /product-layer-data
    volumes:
      - ./backend:/app
      - ./storage:/storage
      - ../product-layer/data:/product-layer-data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
