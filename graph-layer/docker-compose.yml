services:
  neo4j:
    image: neo4j:5-community
    container_name: thebenpaul-graph-neo4j
    environment:
      NEO4J_AUTH: neo4j/thebenpaul
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p thebenpaul 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  graph-layer:
    build: .
    container_name: thebenpaul-graph-layer
    environment:
      PORT: 8096
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: thebenpaul
      NEO4J_DATABASE: neo4j
      THEBEN_PRODUCT_EXPORT_PATH: /product-layer-data/products.json
      THEBEN_GRAPH_CONFIG: /app/config/runtime.json
    ports:
      - "8096:8096"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ../product-layer/data:/product-layer-data:ro
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
